<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Libros</title>
</head>
<body>
    <h1>Lista de Libros</h1>
    <ul>
        {% for libro in libros %}
            <li>{{ libro.titulo }} - {{ libro.autor }} - {{ libro.anio }}
                <a href="{% url 'actualizar_libro' libro.id %}">Editar</a>
                <a href="{% url 'eliminar_libro' libro.id %}">Eliminar</a>
            </li>
        {% endfor %}
    </ul>
    <a href="{% url 'crear_libro' %}">Agregar Libro</a>
</body>
</html>
